name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      # ── Main dashboard ────────────────────────────────────────
      - name: Install main dashboard deps
        run: npm ci
        working-directory: dashboard

      - name: Build main dashboard
        run: npm run build
        working-directory: dashboard
        env:
          OBSERVABLE_TELEMETRY_DISABLE: "true"

      # ── Polish dashboard (sub-path /polish/) ──────────────────
      - name: Install polish dashboard deps
        run: npm ci
        working-directory: dashboard-polish

      - name: Build polish dashboard
        run: npm run build
        working-directory: dashboard-polish
        env:
          OBSERVABLE_TELEMETRY_DISABLE: "true"

      # ── Combine into a single artifact ────────────────────────
      - name: Combine builds
        run: |
          mkdir -p combined
          cp -r dashboard/dist/. combined/
          mkdir -p combined/polish
          cp -r dashboard-polish/dist/. combined/polish/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
